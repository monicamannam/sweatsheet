<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SweatSheet — Exercise List</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="components.js"></script>
</head>
<body>

  <site-header></site-header>

  <main class="page">
    <div class="page-header">
      <h2>Exercise List</h2>
    </div>

    <div class="filters">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search exercises…" />
      </div>
      <select id="category-filter">
        <option value="">All Categories</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="exercise-tbody">
          <tr class="state-row">
            <td colspan="3">
              <div class="spinner"></div>
              Loading exercises…
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <site-nav active="exercise-list"></site-nav>

  <script type="module">
    import { getCategories, getExercises } from './db.js'

    const tbody          = document.getElementById('exercise-tbody')
    const searchInput    = document.getElementById('search')
    const categoryFilter = document.getElementById('category-filter')

    let allExercises = []

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ))
    }

    function renderTable(exercises) {
      if (!exercises.length) {
        tbody.innerHTML = `
          <tr class="state-row">
            <td colspan="3">
              No exercises found.
            </td>
          </tr>`
        return
      }

      tbody.innerHTML = exercises.map(ex => {
        const name = escapeHtml(ex.name)
        const cat  = ex.sweatsheet_categories?.name
        const desc = ex.description ? escapeHtml(ex.description) : '—'

        return `
          <tr>
            <td data-label="Name"><span class="exercise-name">${name}</span></td>
            <td data-label="Category">${cat ? `<span class="badge">${escapeHtml(cat)}</span>` : '—'}</td>
            <td data-label="Description"><span class="exercise-desc">${desc}</span></td>
          </tr>`
      }).join('')
    }

    function applyFilters() {
      const search = searchInput.value.toLowerCase()
      const catId  = categoryFilter.value
      renderTable(allExercises.filter(ex => {
        const matchesSearch   = ex.name.toLowerCase().includes(search)
        const matchesCategory = !catId || String(ex.category_id) === catId
        return matchesSearch && matchesCategory
      }))
    }

    async function init() {
      try {
        const [categories, exercises] = await Promise.all([getCategories(), getExercises()])

        for (const cat of categories) {
          const opt = document.createElement('option')
          opt.value = cat.id
          opt.textContent = cat.name
          categoryFilter.appendChild(opt)
        }

        allExercises = exercises
        renderTable(allExercises)
      } catch (err) {
        console.error(err)
        tbody.innerHTML = `<tr class="state-row"><td colspan="3">Couldn't load exercises. Check your connection and try again.</td></tr>`
      }
    }

    searchInput.addEventListener('input', applyFilters)
    categoryFilter.addEventListener('change', applyFilters)
    init()
  </script>

</body>
</html>
