<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SweatSheet — Workout Logs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="components.js"></script>

  <!-- New-session button, edit buttons, modal, calendar. Move into styles.css if you prefer. -->
  <style>
    /* Header layout: title + log button hug the left, the person dropdown
       sits at the far right (where the button used to be). */
    .logs-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .logs-header h2 { margin: 0; }
    .logs-header #user-filter { margin-left: auto; }

    .session-btn {
      font: inherit; font-weight: 600; cursor: pointer; white-space: nowrap;
      border: none; border-radius: 10px; padding: 9px 14px;
      background: #6c3fcf; color: #fff;
    }
    .session-btn:disabled { opacity: .45; cursor: default; }

    .edit-btn {
      margin-left: auto; font: inherit; font-size: .8rem; font-weight: 600; cursor: pointer;
      border: 1px solid #cdbff0; background: transparent; color: #6c3fcf;
      border-radius: 8px; padding: 4px 10px;
    }

    /* ── GitHub-style activity calendar ───────────────────────── */
    .cal-wrap:empty { display: none; }          /* no border/space before a person is picked */
    .cal-card { margin: 4px 0 20px; }
    .cal-scroll { overflow-x: auto; padding-bottom: 4px; }
    .cal-inner { display: inline-block; min-width: max-content; }
    /* COL pitch below (15px) must match: .cal-cell width (12) + .cal-weeks gap (3). */
    .cal-months { position: relative; height: 15px; margin-left: 30px; font-size: .68rem; color: #6b6580; }
    .cal-months span { position: absolute; top: 0; white-space: nowrap; }
    .cal-body { display: flex; gap: 4px; }      /* weekday col (26) + this gap (4) = 30 = months margin-left */
    .cal-weekdays { display: flex; flex-direction: column; gap: 3px; width: 26px; }
    .cal-weekdays div { height: 12px; line-height: 12px; font-size: .62rem; color: #6b6580; }
    .cal-weeks { display: flex; gap: 3px; }
    .cal-week { display: flex; flex-direction: column; gap: 3px; }
    .cal-cell { width: 12px; height: 12px; border-radius: 3px; background: #eceaf2; }
    .cal-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 12px; font-size: .78rem; color: #4a4458; }
    .cal-legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .cal-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; flex: none; }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(20,12,40,.45);
      display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      background: #fff; border-radius: 16px; padding: 22px; width: 100%; max-width: 360px;
      box-shadow: 0 12px 40px rgba(20,12,40,.25);
    }
    .modal h3 { margin: 0 0 14px; }
    .modal .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .modal .field label { font-weight: 600; font-size: .85rem; }
    .modal .field input {
      font: inherit; padding: 10px 12px; border: 1px solid #d8d2e6;
      border-radius: 10px; background: #fff; color: inherit;
    }
    .modal .field input:focus { outline: 2px solid #6c3fcf; outline-offset: 1px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }

    .btn { font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: 10px; padding: 10px 16px; background: #6c3fcf; color: #fff; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-ghost { background: transparent; color: #6c3fcf; border: 1px solid #cdbff0; }
    .status { font-size: .85rem; }
    .status.err { color: #c02; }
  </style>
</head>
<body>

  <site-header></site-header>

  <main class="page">
    <div class="page-header logs-header">
      <h2>Workout Logs</h2>
      <button class="session-btn" id="new-session" disabled title="Pick a person first">+ Log workout session</button>
      <select id="user-filter">
        <option value="">Select a person…</option>
      </select>
    </div>

    <div id="calendar" class="cal-wrap"></div>

    <div id="days">
      <div class="center-state">Select a person to see their workouts.</div>
    </div>
  </main>

  <site-nav active="workout-logs"></site-nav>

  <!-- New workout session modal -->
  <div class="modal-backdrop hidden" id="ns-modal">
    <div class="modal">
      <h3>New workout session</h3>
      <div class="field">
        <label for="ns-date">Date</label>
        <input type="date" id="ns-date" />
      </div>
      <div class="field">
        <label for="ns-title">Title <span style="font-weight:400;opacity:.6">(optional)</span></label>
        <input type="text" id="ns-title" placeholder="e.g. Push Day, Legs…" />
      </div>
      <span class="status err" id="ns-status"></span>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="ns-cancel">Cancel</button>
        <button class="btn" id="ns-create">Create &amp; add exercises</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { getUsers, getWorkoutDays, createWorkoutDay } from './db.js'

    const userFilter   = document.getElementById('user-filter')
    const container    = document.getElementById('days')
    const calendarEl   = document.getElementById('calendar')
    const newSessionBtn= document.getElementById('new-session')
    const modal        = document.getElementById('ns-modal')
    const nsDate       = document.getElementById('ns-date')
    const nsTitle      = document.getElementById('ns-title')
    const nsStatus     = document.getElementById('ns-status')
    const nsCreate     = document.getElementById('ns-create')
    const nsCancel     = document.getElementById('ns-cancel')

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ))
    }

    // Parse 'YYYY-MM-DD' as a LOCAL date (avoids the UTC day-shift).
    function fmtDate(ymd) {
      if (!ymd) return ''
      const [y, m, d] = ymd.split('-').map(Number)
      return new Date(y, m - 1, d).toLocaleDateString(undefined, {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
      })
    }

    // Today's date in Pacific time, as YYYY-MM-DD (en-CA gives that format).
    function todayPacific() {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Los_Angeles', year: 'numeric', month: '2-digit', day: '2-digit'
      }).format(new Date())
    }

    function fmtSet(s) {
      const hasReps = s.reps !== null && s.reps !== undefined
      const hasWeight = s.weight !== null && s.weight !== undefined
      const w = hasWeight ? Number(s.weight) : null     // trims trailing .00
      if (hasReps && hasWeight) return `${s.reps}×${w}`
      if (hasReps) return `${s.reps}`
      if (hasWeight) return `${w}`
      return '—'
    }

    function renderDays(days) {
      if (!days.length) {
        container.innerHTML = `<div class="center-state"><div class="empty-icon">📋</div>No workouts logged yet.</div>`
        return
      }

      container.innerHTML = days.map(day => {
        const title = day.title ? escapeHtml(day.title) : ''

        const exercises = [...(day.sweatsheet_workout_exercises || [])].sort((a, b) => a.id - b.id)

        const body = exercises.length
          ? exercises.map(ex => {
              const exName = ex.sweatsheet_workouts?.name ? escapeHtml(ex.sweatsheet_workouts.name) : '—'
              const sets = [...(ex.sweatsheet_workout_sets || [])]
                .sort((a, b) => (a.set_number || 0) - (b.set_number || 0))
              const chips = sets.length
                ? sets.map(s => `<span class="set-chip">${escapeHtml(fmtSet(s))}</span>`).join('')
                : `<span class="day-empty">no sets</span>`
              return `<div class="ex-row"><span class="ex-name">${exName}</span><span class="set-list">${chips}</span></div>`
            }).join('')
          : `<div class="day-empty">No exercises logged</div>`

        return `
          <div class="panel">
            <div class="day-head">
              <span class="day-date">${fmtDate(day.performed_date)}</span>
              ${title ? `<span class="day-title">${title}</span>` : ''}
              <button class="edit-btn" data-edit-day="${day.id}">Edit</button>
            </div>
            <div class="day-exercises">${body}</div>
          </div>`
      }).join('')
    }

    // ── Activity calendar ─────────────────────────────────────────
    // Keep COL in sync with CSS: .cal-cell width (12) + .cal-weeks gap (3).
    const COL = 15

    function ymdLocal(date) {
      const y = date.getFullYear()
      const m = String(date.getMonth() + 1).padStart(2, '0')
      const d = String(date.getDate()).padStart(2, '0')
      return `${y}-${m}-${d}`
    }

    // FNV-1a hash — same title always maps to the same number (and color).
    function hashStr(str) {
      let h = 2166136261
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i)
        h = Math.imul(h, 16777619)
      }
      return h >>> 0
    }

    // A unique, stable color per workout title. Blank titles get a neutral grey.
    function colorForTitle(rawTitle) {
      const t = (rawTitle || '').trim()
      if (!t) return { fill: '#c7c1d6', label: 'Untitled', key: '' }
      const h = hashStr(t.toLowerCase())
      const hue   = h % 360
      const sat   = 58 + (h >> 9)  % 24   // 58–81%
      const light = 52 + (h >> 17) % 10   // 52–61%
      return { fill: `hsl(${hue} ${sat}% ${light}%)`, label: t, key: t.toLowerCase() }
    }

    function renderCalendar(days) {
      // date -> title. Days arrive newest-first, so the latest session that day wins.
      const byDate = new Map()
      for (const d of days) {
        if (d.performed_date && !byDate.has(d.performed_date)) {
          byDate.set(d.performed_date, d.title || '')
        }
      }

      // ~53 weeks ending today (Pacific), starting on a Sunday.
      const [ty, tm, td] = todayPacific().split('-').map(Number)
      const today = new Date(ty, tm - 1, td)
      const cur = new Date(today)
      cur.setDate(cur.getDate() - 363)
      cur.setDate(cur.getDate() - cur.getDay())   // back up to Sunday

      const weeks = []
      while (cur <= today) {
        const col = []
        for (let i = 0; i < 7; i++) {
          col.push(new Date(cur))
          cur.setDate(cur.getDate() + 1)
        }
        weeks.push(col)
      }

      const weeksHtml = weeks.map(col => {
        const cells = col.map(date => {
          if (date > today) return `<div class="cal-cell" style="visibility:hidden"></div>`
          const key = ymdLocal(date)
          const has = byDate.has(key)
          if (!has) return `<div class="cal-cell" title="${escapeHtml(fmtDate(key))}"></div>`
          const title = byDate.get(key)
          const fill  = colorForTitle(title).fill
          const tip   = fmtDate(key) + ' — ' + (title && title.trim() ? title : 'Untitled')
          return `<div class="cal-cell" style="background:${fill}" title="${escapeHtml(tip)}"></div>`
        }).join('')
        return `<div class="cal-week">${cells}</div>`
      }).join('')

      // Month labels at the column where each month first appears.
      let prevMonth = -1
      const monthsHtml = weeks.map((col, i) => {
        const m = col[0].getMonth()
        if (m === prevMonth) return ''
        prevMonth = m
        const name = col[0].toLocaleDateString(undefined, { month: 'short' })
        return `<span style="left:${i * COL}px">${name}</span>`
      }).join('')

      // Legend of the unique titles present, alphabetised.
      const seen = new Map()
      for (const t of byDate.values()) {
        const c = colorForTitle(t)
        if (!seen.has(c.key)) seen.set(c.key, c)
      }
      const legendItems = [...seen.values()].sort((a, b) => a.label.localeCompare(b.label))
      const legendHtml = legendItems.length
        ? `<div class="cal-legend">` + legendItems.map(c =>
            `<span class="cal-legend-item"><span class="cal-swatch" style="background:${c.fill}"></span>${escapeHtml(c.label)}</span>`
          ).join('') + `</div>`
        : ''

      calendarEl.innerHTML = `
        <div class="cal-card">
          <div class="cal-scroll">
            <div class="cal-inner">
              <div class="cal-months">${monthsHtml}</div>
              <div class="cal-body">
                <div class="cal-weekdays">
                  <div></div><div>Mon</div><div></div><div>Wed</div><div></div><div>Fri</div><div></div>
                </div>
                <div class="cal-weeks">${weeksHtml}</div>
              </div>
            </div>
          </div>
          ${legendHtml}
        </div>`
    }

    // Read/write the ?user= param so a selection survives refresh and is shareable.
    function getUserParam() {
      return new URLSearchParams(window.location.search).get('user') || ''
    }

    function setUserParam(userId) {
      const url = new URL(window.location.href)
      if (userId) url.searchParams.set('user', userId)
      else        url.searchParams.delete('user')
      history.replaceState(null, '', url)
    }

    function syncNewSessionBtn() {
      newSessionBtn.disabled = !userFilter.value
      newSessionBtn.title = userFilter.value ? '' : 'Pick a person first'
    }

    async function loadDays(userId) {
      calendarEl.innerHTML = ''
      container.innerHTML = `<div class="center-state"><div class="spinner"></div>Loading workouts…</div>`
      try {
        const days = await getWorkoutDays(userId)
        renderCalendar(days)
        renderDays(days)
      } catch (err) {
        console.error(err)
        calendarEl.innerHTML = ''
        container.innerHTML = `<div class="center-state">Couldn't load workouts. Check your connection and try again.</div>`
      }
    }

    // --- modal ---
    function openModal() {
      if (!userFilter.value) return
      nsDate.value = todayPacific()
      nsTitle.value = ''
      nsStatus.textContent = ''
      modal.classList.remove('hidden')
      nsTitle.focus()
    }
    function closeModal() { modal.classList.add('hidden') }

    async function createSession() {
      if (!userFilter.value) return
      if (!nsDate.value) { nsStatus.textContent = 'Pick a date.'; return }
      nsCreate.disabled = true
      nsStatus.textContent = ''
      try {
        const dayId = await createWorkoutDay({
          userId: userFilter.value,
          performedDate: nsDate.value,
          title: nsTitle.value.trim(),
        })
        // Hand off to the log page for this brand-new session.
        location.href = 'log-workout.html?day=' + encodeURIComponent(dayId)
      } catch (err) {
        console.error(err)
        nsStatus.textContent = "Couldn't create the session."
        nsCreate.disabled = false
      }
    }

    async function init() {
      try {
        const users = await getUsers()
        for (const u of users) {
          const opt = document.createElement('option')
          opt.value = u.id
          opt.textContent = u.name
          userFilter.appendChild(opt)
        }
      } catch (err) {
        console.error(err)
        container.innerHTML = `<div class="center-state">Couldn't load people. Check your connection and try again.</div>`
        return
      }

      userFilter.addEventListener('change', () => {
        setUserParam(userFilter.value)
        syncNewSessionBtn()
        if (userFilter.value) {
          loadDays(userFilter.value)
        } else {
          calendarEl.innerHTML = ''
          container.innerHTML = `<div class="center-state">Select a person to see their workouts.</div>`
        }
      })

      // Edit a session -> open it on the log page.
      container.addEventListener('click', e => {
        const btn = e.target.closest('[data-edit-day]')
        if (!btn) return
        location.href = 'log-workout.html?day=' + encodeURIComponent(btn.dataset.editDay)
      })

      newSessionBtn.addEventListener('click', openModal)
      nsCancel.addEventListener('click', closeModal)
      nsCreate.addEventListener('click', createSession)
      modal.addEventListener('click', e => { if (e.target === modal) closeModal() })

      // Restore the selection from the URL (e.g. after a refresh or a shared link).
      const fromUrl = getUserParam()
      if (fromUrl && [...userFilter.options].some(o => o.value === fromUrl)) {
        userFilter.value = fromUrl
        loadDays(fromUrl)
      } else if (fromUrl) {
        setUserParam('')   // stale id — drop it
      }
      syncNewSessionBtn()
    }

    init()
  </script>

</body>
</html>
