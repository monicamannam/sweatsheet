<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SweatSheet — Log a Workout</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="components.js"></script>

  <!-- Form-specific styling. Reuses your tokens; move into styles.css if you prefer. -->
  <style>
    .field        { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
    .field label  { font-weight: 600; font-size: .85rem; letter-spacing: .02em; }
    .field input,
    .field select,
    .ex-pick select,
    .set-row input {
      font: inherit; padding: 10px 12px; border: 1px solid #d8d2e6;
      border-radius: 10px; background: #fff; color: inherit;
    }
    .field input:focus,
    .field select:focus,
    .ex-pick select:focus,
    .set-row input:focus { outline: 2px solid #6c3fcf; outline-offset: 1px; }

    .session-summary { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .session-summary .who  { font-weight: 600; }
    .session-summary .when { opacity: .7; font-size: .9rem; }
    .session-summary .what { color: #6c3fcf; font-weight: 600; }

    .ex-block   { border: 1px solid #e7e2f1; border-radius: 14px; padding: 12px 14px; margin: 12px 0; }
    .ex-block .ex-name { font-weight: 600; display: block; margin-bottom: 8px; }
    .ex-block .set-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .ex-block .day-empty { opacity: .55; font-size: .85rem; }

    /* a single reps/weight row, used in both the add-exercise grid and inline +Set */
    .set-row    { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .set-row .set-no { width: 46px; font-size: .8rem; font-weight: 600; color: #6c3fcf; }
    .set-row input   { width: 0; flex: 1; min-width: 0; }
    .set-row .btn-x  { background: none; border: none; color: #b08; cursor: pointer; font-size: 1.05rem; line-height: 1; padding: 0 4px; }

    .ex-pick    { display: flex; gap: 8px; }
    .ex-pick select { flex: 1; }

    .btn { font: inherit; font-weight: 600; cursor: pointer; border: none; border-radius: 10px; padding: 11px 16px; background: #6c3fcf; color: #fff; }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-ghost  { background: transparent; color: #6c3fcf; border: 1px solid #cdbff0; }
    .btn-sm     { padding: 9px 12px; font-size: .9rem; }
    .btn-link   { background: none; border: none; color: #6c3fcf; cursor: pointer; font: inherit; font-weight: 600; padding: 4px 2px; }

    .add-ex-form { border-top: 1px dashed #d8d2e6; margin-top: 16px; padding-top: 16px; }
    .add-ex-form .field { margin-bottom: 10px; }
    .new-sets-label { font-size: .8rem; font-weight: 600; opacity: .7; margin: 4px 0 8px; }

    .form-actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
    .status     { font-size: .9rem; }
    .status.err { color: #c02; }
    .hidden     { display: none; }
  </style>
</head>
<body>

  <site-header></site-header>

  <main class="page">
    <div class="page-header">
      <h2>Log a Workout</h2>
    </div>

    <!-- Shown when there's no ?day= to work on -->
    <div class="panel hidden" id="no-session">
      <div class="center-state">
        No session selected. <a href="workout-logs.html">Go to Workout Logs</a> to start one.
      </div>
    </div>

    <!-- The active session -->
    <div class="panel hidden" id="session">
      <div class="session-summary" id="summary"></div>

      <div id="exercise-list"></div>

      <div class="add-ex-form">
        <div class="field">
          <label for="ex-pick">Add an exercise</label>
          <div class="ex-pick">
            <select id="ex-pick"></select>
          </div>
        </div>

        <div class="new-sets-label">Sets</div>
        <div id="new-sets"></div>
        <button type="button" class="btn-link" id="add-set-row">+ Add set</button>

        <div class="form-actions">
          <button type="button" class="btn btn-sm" id="add-exercise">Add exercise</button>
          <span class="status" id="ex-status"></span>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-ghost btn" id="view-logs">Done — view logs</button>
      </div>
    </div>
  </main>

  <site-nav active="log-workout"></site-nav>

  <script type="module">
    import { getUsers, getWorkouts, addExerciseWithSets, addSet, getWorkoutDay } from './db.js'

    const noSessionEl = document.getElementById('no-session')
    const sessionEl   = document.getElementById('session')
    const summaryEl   = document.getElementById('summary')
    const listEl      = document.getElementById('exercise-list')
    const exPick      = document.getElementById('ex-pick')
    const newSetsEl   = document.getElementById('new-sets')
    const addSetRowBtn= document.getElementById('add-set-row')
    const addExBtn    = document.getElementById('add-exercise')
    const exStatus    = document.getElementById('ex-status')
    const viewLogsBtn = document.getElementById('view-logs')

    // --- state ---
    let dayId = null
    let userId = null
    let workouts = []
    let usersById = {}
    const setCounts = {}   // exerciseId -> highest set_number so far

    // --- helpers ---
    function fmtDate(ymd) {
      if (!ymd) return ''
      const [y, m, d] = ymd.split('-').map(Number)
      return new Date(y, m - 1, d).toLocaleDateString(undefined, {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
      })
    }

    function fmtSet(s) {
      const hasReps = s.reps !== null && s.reps !== undefined
      const hasWeight = s.weight !== null && s.weight !== undefined
      const w = hasWeight ? Number(s.weight) : null
      if (hasReps && hasWeight) return `${s.reps}×${w}`
      if (hasReps) return `${s.reps}`
      if (hasWeight) return `${w}`
      return '—'
    }

    function buildWorkoutOptions(select) {
      select.innerHTML = ''
      const ph = document.createElement('option')
      ph.value = ''; ph.textContent = 'Select an exercise…'
      select.appendChild(ph)
      for (const w of workouts) {
        const opt = document.createElement('option')
        opt.value = w.id; opt.textContent = w.name
        select.appendChild(opt)
      }
    }

    function showSummary(name, performedDate, title) {
      summaryEl.innerHTML = ''
      const who  = document.createElement('span'); who.className  = 'who';  who.textContent  = name
      const when = document.createElement('span'); when.className = 'when'; when.textContent = fmtDate(performedDate)
      summaryEl.append(who, when)
      if (title) {
        const what = document.createElement('span'); what.className = 'what'; what.textContent = title
        summaryEl.appendChild(what)
      }
    }

    // Build a reps/weight input row. `onEnter` fires when Enter is pressed in
    // either field (used to chain quickly into a fresh row); `onRemove` removes it.
    function buildSetRow({ onEnter, onRemove } = {}) {
      const row = document.createElement('div')
      row.className = 'set-row'

      const no = document.createElement('span')
      no.className = 'set-no'

      const reps = document.createElement('input')
      reps.type = 'number'; reps.min = '0'; reps.step = '1'; reps.placeholder = 'reps'; reps.className = 'reps'

      const weight = document.createElement('input')
      weight.type = 'number'; weight.min = '0'; weight.step = '0.5'; weight.placeholder = 'weight'; weight.className = 'weight'

      if (onEnter) {
        const onKey = e => { if (e.key === 'Enter') { e.preventDefault(); onEnter(row) } }
        reps.addEventListener('keydown', onKey)
        weight.addEventListener('keydown', onKey)
      }

      const x = document.createElement('button')
      x.type = 'button'; x.className = 'btn-x'; x.title = 'Remove set'; x.textContent = '✕'
      if (onRemove) x.addEventListener('click', () => onRemove(row))

      row.append(no, reps, weight, x)
      return row
    }

    // --- the "add exercise" set grid ---
    function renumberNewSets() {
      [...newSetsEl.querySelectorAll('.set-no')].forEach((el, i) => { el.textContent = 'Set ' + (i + 1) })
    }

    function addNewSetRow(focus = false) {
      const row = buildSetRow({
        onEnter: () => addNewSetRow(true),
        onRemove: r => { r.remove(); renumberNewSets() },
      })
      newSetsEl.appendChild(row)
      renumberNewSets()
      if (focus) row.querySelector('.reps').focus()
    }

    function resetAddForm() {
      exPick.value = ''
      newSetsEl.innerHTML = ''
      addNewSetRow()          // back to a single empty row
      exStatus.textContent = ''
      exStatus.className = 'status'
    }

    function readNewSets() {
      return [...newSetsEl.querySelectorAll('.set-row')].map(r => ({
        reps:   r.querySelector('.reps').value,
        weight: r.querySelector('.weight').value,
      }))
    }

    // --- exercise cards (with inline single +Set) ---
    function addSetChip(setListEl, set) {
      const empty = setListEl.querySelector('.day-empty')
      if (empty) empty.remove()
      const chip = document.createElement('span')
      chip.className = 'set-chip'
      chip.textContent = fmtSet(set)
      setListEl.appendChild(chip)
    }

    function makeExerciseBlock(exerciseId, name, sets = []) {
      setCounts[exerciseId] = sets.reduce((m, s) => Math.max(m, s.set_number || 0), 0)

      const block = document.createElement('div')
      block.className = 'ex-block'

      const nameEl = document.createElement('span')
      nameEl.className = 'ex-name'; nameEl.textContent = name
      block.appendChild(nameEl)

      const setList = document.createElement('div')
      setList.className = 'set-list'
      if (sets.length) {
        sets.slice().sort((a, b) => (a.set_number || 0) - (b.set_number || 0))
            .forEach(s => addSetChip(setList, s))
      } else {
        const none = document.createElement('span')
        none.className = 'day-empty'; none.textContent = 'no sets yet'
        setList.appendChild(none)
      }
      block.appendChild(setList)

      // inline "add one set" row
      const row = buildSetRow()
      const repsI = row.querySelector('.reps')
      const weightI = row.querySelector('.weight')
      row.querySelector('.set-no').textContent = '+ Set'
      row.querySelector('.btn-x').remove()      // no remove button on the inline adder

      const addBtn = document.createElement('button')
      addBtn.type = 'button'; addBtn.className = 'btn-ghost btn btn-sm'; addBtn.textContent = 'Add'
      row.appendChild(addBtn)

      const submit = async () => {
        if (repsI.value === '' && weightI.value === '') return
        addBtn.disabled = true
        try {
          const next = (setCounts[exerciseId] || 0) + 1
          const set = await addSet({ exerciseId, setNumber: next, reps: repsI.value, weight: weightI.value })
          setCounts[exerciseId] = next
          addSetChip(setList, set)
          repsI.value = ''; weightI.value = ''; repsI.focus()
        } catch (err) {
          console.error(err)
          exStatus.textContent = "Couldn't add set."
          exStatus.className = 'status err'
        } finally {
          addBtn.disabled = false
        }
      }
      addBtn.addEventListener('click', submit)
      const onKey = e => { if (e.key === 'Enter') { e.preventDefault(); submit() } }
      repsI.addEventListener('keydown', onKey)
      weightI.addEventListener('keydown', onKey)

      block.appendChild(row)
      listEl.appendChild(block)
    }

    async function addExerciseHandler() {
      const workoutId = exPick.value
      if (!workoutId) { exStatus.textContent = 'Pick an exercise.'; exStatus.className = 'status err'; return }
      addExBtn.disabled = true
      exStatus.textContent = ''
      try {
        const { exerciseId, sets } = await addExerciseWithSets({
          dayId, workoutId, sets: readNewSets(),
        })
        const name = exPick.selectedOptions[0].textContent
        makeExerciseBlock(exerciseId, name, sets)
        resetAddForm()
      } catch (err) {
        console.error(err)
        exStatus.textContent = "Couldn't add exercise."
        exStatus.className = 'status err'
      } finally {
        addExBtn.disabled = false
      }
    }

    async function restoreSession(id) {
      const day = await getWorkoutDay(id)
      dayId  = day.id
      userId = day.user_id
      showSummary(usersById[userId] || 'Unknown', day.performed_date, day.title)

      const exercises = [...(day.sweatsheet_workout_exercises || [])].sort((a, b) => a.id - b.id)
      for (const ex of exercises) {
        const name = ex.sweatsheet_workouts?.name || '—'
        makeExerciseBlock(ex.id, name, ex.sweatsheet_workout_sets || [])
      }

      buildWorkoutOptions(exPick)
      addNewSetRow()            // seed the add-exercise grid with one row
      addSetRowBtn.addEventListener('click', () => addNewSetRow(true))
      addExBtn.addEventListener('click', addExerciseHandler)
      viewLogsBtn.addEventListener('click', () => {
        location.href = 'workout-logs.html' + (userId ? '?user=' + encodeURIComponent(userId) : '')
      })

      sessionEl.classList.remove('hidden')
    }

    async function init() {
      const dayParam = new URLSearchParams(location.search).get('day')
      if (!dayParam) { noSessionEl.classList.remove('hidden'); return }

      try {
        const [users, cat] = await Promise.all([getUsers(), getWorkouts()])
        workouts = cat
        for (const u of users) usersById[u.id] = u.name
        await restoreSession(dayParam)
      } catch (err) {
        console.error(err)
        noSessionEl.classList.remove('hidden')
      }
    }

    init()
  </script>

</body>
</html>
