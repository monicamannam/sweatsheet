<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SweatSheet</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background: #fff;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #D85A30, #7F77DD, #1D9E75);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #888; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div>
    <h1>The SweatSheet</h1>
    <p>Hello buj to your workout tracker! 💪</p>
  </div>
</body>
</html>
